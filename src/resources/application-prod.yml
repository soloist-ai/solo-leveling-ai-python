# =============================================================================
# Solo Leveling AI - Production Overrides
# =============================================================================

app:
  environment: production
  debug: true

features:
  use_schema_registry: true

kafka:
  bootstrap_servers: kafka-service:9092
  consumer:
    session_timeout_ms: 45000
  producer:
    retries: 5

schema_registry:
  url: http://schema-registry-service:8081

logging:
  level: INFO
  handlers:
    console:
      level: INFO
    file:
      enabled: true
      level: INFO
