# =============================================================================
# Solo Leveling AI - Production Overrides
# =============================================================================

app:
  environment: production
  debug: false

kafka:
  bootstrap_servers: kafka-cluster.production.svc.cluster.local:9092
  consumer:
    group_id: "task-consumer-group-prod"
    session_timeout_ms: 45000
  producer:
    retries: 5

schema_registry:
  url: http://schema-registry.production.svc.cluster.local:8081

logging:
  level: ERROR
  handlers:
    console:
      level: ERROR
    file:
      enabled: true
      level: ERROR
