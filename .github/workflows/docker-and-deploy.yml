name: Docker Build, Push and Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      replicas:
        description: 'Number of replicas (pods) to deploy'
        required: true
        default: 1
        type: number
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USER }}/solo-leveling-ai-python

jobs:
  # ==========================================================================
  # Job 1: Линтинг и тесты (опционально, но рекомендуется)
  # ==========================================================================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: poetry install

      - name: Run linter
        run: poetry run ruff check src/
        continue-on-error: true

      - name: Run type checker
        run: poetry run mypy src/
        continue-on-error: true

  # ==========================================================================
  # Job 2: Сборка и деплой Docker образа
  # ==========================================================================
  docker-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      # ----------------------------------------------------------------------
      # Подготовка
      # ----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install gettext for envsubst
        run: |
          sudo apt-get update && sudo apt-get install -y gettext-base

      # ----------------------------------------------------------------------
      # Docker build и push
      # ----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ----------------------------------------------------------------------
      # Kubernetes deployment
      # ----------------------------------------------------------------------
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Set environment variables for deployment
        run: |
          echo "GIT_COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "DOCKERHUB_USER=${{ secrets.DOCKERHUB_USER }}" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> $GITHUB_ENV
          echo "REPLICAS=${{ inputs.replicas || 1 }}" >> $GITHUB_ENV

      - name: Setup kubeconfig
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG" > ~/.kube/config

      - name: Generate final deployment.yml with env vars
        run: |
          envsubst < k8s/deployment.yml > k8s/deployment-rendered.yml
          cat k8s/deployment-rendered.yml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment-rendered.yml
          kubectl apply -f k8s/service.yml

      - name: Wait for deployment rollout
        run: |
          kubectl rollout status deployment/solo-leveling-ai-python --timeout=120s

      # ----------------------------------------------------------------------
      # Очистка
      # ----------------------------------------------------------------------
      - name: Clean up temporary files (security)
        run: |
          rm -f k8s/deployment-rendered.yml
