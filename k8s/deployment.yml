apiVersion: apps/v1
kind: Deployment
metadata:
  name: soloist-ai
spec:
  replicas: ${REPLICAS}
  selector:
    matchLabels:
      app: soloist-ai
  template:
    metadata:
      labels:
        app: soloist-ai
      annotations:
        commit.sha: "${GIT_COMMIT_SHA}"
    spec:
      containers:
        - name: app
          image: $DEPLOY_IMAGE
          ports:
            - containerPort: 8080
          env:
            - name: OPENROUTER_API_KEY
              value: "${OPENROUTER_API_KEY}"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5