apiVersion: apps/v1
kind: Deployment
metadata:
  name: solo-leveling-ai-python
spec:
  replicas: ${REPLICAS}
  selector:
    matchLabels:
      app: solo-leveling-ai-python
  template:
    metadata:
      labels:
        app: solo-leveling-ai-python
      annotations:
        commit.sha: "${GIT_COMMIT_SHA}"
    spec:
      containers:
        - name: app
          image: $DOCKERHUB_USER/solo-leveling-ai-python:$GIT_COMMIT_SHA
          ports:
            - containerPort: 8080
          env:
            - name: OPENROUTER_API_KEY
              value: "${OPENROUTER_API_KEY}"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5